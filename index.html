<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unit Distance Wallpaper</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script defer src="src/graph.js"></script>
    <script defer src="src/app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <aside class="controls" aria-label="Wallpaper controls">
        <header class="brand">
          <h1>Unit Distance Wallpaper</h1>
          <p id="graphSummary">Preparing graph...</p>
        </header>

        <form id="controlForm">
          <fieldset>
            <legend>Graph</legend>
            <div class="two-up">
              <label>
                <span>Radius</span>
                <input id="radiusInput" type="number" min="0.5" max="12" step="0.1" value="4">
              </label>
              <label>
                <span>Max points</span>
                <input id="maxPointsInput" type="number" min="50" max="20000" step="50" value="2500">
              </label>
            </div>
            <div class="two-up">
              <label>
                <span>Coeff min</span>
                <input id="coefficientMinInput" type="number" min="-60" max="60" step="1" value="-4">
              </label>
              <label>
                <span>Coeff max</span>
                <input id="coefficientMaxInput" type="number" min="-60" max="60" step="1" value="4">
              </label>
            </div>
            <div class="two-up">
              <label>
                <span>rho root order</span>
                <select id="rootOrderInput"></select>
              </label>
              <label>
                <span>Primitive power</span>
                <select id="rootExponentInput"></select>
              </label>
            </div>
            <output id="constructionOutput" class="construction-output">
              rho = zeta_6, full ring Z[zeta_12], rank 4
            </output>
          </fieldset>

          <fieldset>
            <legend>Style</legend>
            <div class="swatches">
              <label>
                <span>Points</span>
                <input id="pointColorInput" type="color" value="#f4f7fb">
              </label>
              <label>
                <span>Lines</span>
                <input id="lineColorInput" type="color" value="#2dd4bf">
              </label>
              <label>
                <span>Background</span>
                <input id="backgroundColorInput" type="color" value="#101820">
              </label>
            </div>
            <div class="two-up">
              <label>
                <span>Dot px</span>
                <input id="pointSizeInput" type="number" min="0.5" max="24" step="0.25" value="3">
              </label>
              <label>
                <span>Line px</span>
                <input id="lineWidthInput" type="number" min="0.25" max="12" step="0.25" value="1.25">
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Viewport</legend>
            <label>
              <span>Preview size</span>
              <select id="previewPresetInput"></select>
            </label>
            <label>
              <span>World width</span>
              <input id="worldWidthInput" type="number" min="0.1" max="40" step="0.1" value="8.8">
            </label>
            <label>
              <span>Zoom</span>
              <input id="zoomInput" type="range" min="0.5" max="16" step="0.1" value="1">
              <output id="zoomOutput" for="zoomInput">1.0x</output>
            </label>
            <div class="two-up">
              <label>
                <span>Custom w</span>
                <input id="customWidthInput" type="number" min="320" max="10000" step="1" value="1080">
              </label>
              <label>
                <span>Custom h</span>
                <input id="customHeightInput" type="number" min="320" max="12000" step="1" value="2400">
              </label>
            </div>
          </fieldset>

          <fieldset>
            <legend>Exports</legend>
            <div id="exportPresetList" class="preset-list"></div>
            <div class="actions">
              <button id="exportPreviewButton" type="button">Export preview</button>
              <button id="exportSelectedButton" type="button">Build selected PNGs</button>
              <button id="clearExportsButton" type="button">Clear</button>
            </div>
          </fieldset>
        </form>
      </aside>

      <section class="preview-area" aria-label="Wallpaper preview">
        <div class="preview-toolbar">
          <div>
            <strong id="previewName">Preview</strong>
            <span id="previewSize">1080 x 2400</span>
          </div>
          <div id="warningText" class="warning" role="status" aria-live="polite"></div>
        </div>
        <div class="canvas-frame">
          <canvas id="wallpaperCanvas" width="1080" height="2400"></canvas>
        </div>
        <div id="exportOutput" class="export-output" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
